services:
  mysql:
    image: mysql:8.0
    container_name: skymate-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: skymate
      MYSQL_USER: skymate_user
      MYSQL_PASSWORD: skymatepassword
    ports:
      - "5307:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  backend:
    build:
      context: ./backend
    container_name: skymate-backend
    restart: always
    depends_on:
      - mysql
      - mcp-server
    environment:
      DATABASE_URL: mysql+pymysql://skymate_user:skymatepassword@mysql:3306/skymate
      SECRET_KEY: supersecretkey
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 60
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      MCP_SERVER_URL: http://mcp-server:8001/mcp
      AVIATIONSTACK_API_KEY: ${AVIATIONSTACK_API_KEY}
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app

  frontend:
    build:
      context: ./frontend
    container_name: skymate-frontend
    restart: always
    depends_on:
      - backend
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8000
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules

  mcp-server:
    build:
      context: ./mcp-server
    container_name: skymate-mcp
    restart: always
    environment:
      AVIATIONSTACK_API_KEY: ${AVIATIONSTACK_API_KEY}
    ports:
      - "8001:8001"
    volumes:
      - ./mcp-server:/app

volumes:
  mysql_data: